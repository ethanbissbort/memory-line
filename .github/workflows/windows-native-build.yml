name: Windows Native Build

# Full compile + test of the native Windows (WinUI 3 / .NET 8) implementation.
# The solution only defines x64/x86/ARM64 platforms (no AnyCPU) and the test
# project references the WinUI app, so the whole solution is built for x64 on a
# Windows runner (the WinUI target cannot build on Linux).
#
# WinUI 3 PRI resource generation (MrtCore.PriGen -> ExpandPriContent task) uses a
# .NET Framework MSBuild task that does NOT load under the `dotnet build` (.NET Core)
# MSBuild engine, so the build is driven by the full Visual Studio msbuild.exe.
# The .NET SDK is still pinned to 8.0 via windows-native/src/global.json for the
# C# compilation.

on:
  push:
    branches: [ claude/multi-agent-code-review-bVmNX ]
    paths:
      - 'windows-native/**'
      - '.github/workflows/windows-native-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: windows-native/src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild (Visual Studio)
        uses: microsoft/setup-msbuild@v2

      - name: dotnet --info
        run: dotnet --info

      - name: Build (Release | x64) via VS MSBuild
        shell: pwsh
        run: |
          msbuild MemoryTimeline.sln /t:Restore,Build `
            /p:Configuration=Release /p:Platform=x64 /m /v:minimal `
            /clp:NoSummary 2>&1 | Tee-Object -FilePath build.log
          $code = $LASTEXITCODE
          # Surface distinct MSBuild/compiler error lines as GH annotations (readable
          # without auth-gated logs), plus a job-summary list. Cap at 30.
          $errs = Select-String -Path build.log -Pattern ': error ' |
                  ForEach-Object { $_.Line.Trim() } | Sort-Object -Unique
          $errs | Select-Object -First 30 | ForEach-Object { "::error::$_" }
          "### Build errors ($($errs.Count))" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          $errs | ForEach-Object { "- $_" } | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          exit $code

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: windows-native/src/build.log
          if-no-files-found: ignore

      # Compile is the gate for this workflow; test execution of a self-contained
      # WinUI 3 assembly under headless VSTest is best-effort, so it does not fail
      # the run. The test outcome + tail is surfaced for visibility.
      - name: Test (Release | x64)
        if: success()
        continue-on-error: true
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Recurse -Path MemoryTimeline.Tests/bin/x64/Release `
                   -Filter MemoryTimeline.Tests.dll | Select-Object -First 1
          if (-not $dll) { "::error::Test assembly not found"; exit 1 }
          Write-Host "Running tests in $($dll.FullName)"
          dotnet vstest $dll.FullName --logger:"trx;LogFileName=test.trx" `
            --ResultsDirectory:TestResults 2>&1 | Tee-Object -FilePath test.log
          $code = $LASTEXITCODE
          # Concise, high-signal diagnostics (annotation channel is small): parse the
          # TRX counters if present, else show the first few log lines (load errors
          # surface early). Logs/TRX are also uploaded as an artifact.
          $trx = Get-ChildItem -Recurse -Path TestResults -Filter *.trx | Select-Object -First 1
          if ($trx) {
            [xml]$x = Get-Content $trx.FullName
            $c = $x.TestRun.ResultSummary.Counters
            "::error::TESTS total=$($c.total) passed=$($c.passed) failed=$($c.failed) exit=$code"
            $x.TestRun.Results.UnitTestResult |
              Where-Object { $_.outcome -eq 'Failed' } | Select-Object -First 6 |
              ForEach-Object { "::error::FAILED $($_.testName): $($_.Output.ErrorInfo.Message)" }
          } else {
            "::error::No TRX produced (vstest exit=$code). First log lines:"
            Get-Content test.log -TotalCount 8 | ForEach-Object { "::error::$($_.Trim())" }
          }
          "### Test output (exit $code)" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          Get-Content test.log -Tail 100 | ForEach-Object { "- $_" } | Out-File $env:GITHUB_STEP_SUMMARY -Append
          exit $code

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            windows-native/src/test.log
            windows-native/src/TestResults
          if-no-files-found: ignore
